<div class="container mt-4">
   <div class="col-xs-12 text-center">
        <h2 class="section-title">My Scheduled Appointments</h2>
        <p class="section-subtitle">Your Medical Appointments Summary</p>
        <hr>
    </div>
  
  <div *ngIf="appointments.length === 0" class="alert alert-info">
    You don't have any appointments scheduled yet.
  </div>

  <table class="table table-striped table-hover" *ngIf="appointments.length > 0">
    <thead class="thead-dark">
      <tr>
        <th>Specialist</th>
        <th>Date</th>
        <th>Hour</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let appt of appointments">
        <td><strong>{{ appt.specialistName }}</strong></td>

        <td>
          <span *ngIf="!appt.isEditing">{{ appt.date }}</span>
          <span *ngIf="appt.isEditing" class="text-muted">New schedule:</span>
        </td>

        <td>
          <span *ngIf="!appt.isEditing">{{ appt.hour }}</span>
          
          <select *ngIf="appt.isEditing" [(ngModel)]="appt.tempSlot" class="form-control input-sm">
            <option *ngFor="let slot of appt.availableSlots" [value]="slot.date + ' - ' + slot.hour">
              {{ slot.date }} - {{ slot.hour }}
            </option>
          </select>
        </td>

        <td>
          <span class="label" [ngClass]="appt.isEditing ? 'label-warning' : 'label-success'">
            {{ appt.isEditing ? 'Editing...' : 'Confirmed' }}
          </span>
        </td>

        <td>
          <ng-container *ngIf="!appt.isEditing">
            <button class="btn btn-primary btn-xs" (click)="onEdit(appt)" style="margin-right: 5px;">
              Edit
            </button>
            <button class="btn btn-danger btn-xs" (click)="onCancel(appt._id)">
              Cancel
            </button>
          </ng-container>

          <ng-container *ngIf="appt.isEditing">
            <button class="btn btn-success btn-xs" (click)="onSave(appt)" style="margin-right: 5px;">
              Save
            </button>
            <button class="btn btn-default btn-xs" (click)="appt.isEditing = false">
              Cancel
            </button>
          </ng-container>
        </td>
      </tr>
    </tbody>
  </table>
</div>
